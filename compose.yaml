services:
  backend:
    build: ./backend
    image: exam-splitter-backend
    container_name: exam-splitter-backend
    environment:
      - EXAM_SPLITTER_DATA_DIR=/data
    volumes:
      - ./uploads:/data/uploads
      - ./outputs:/data/outputs
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: exam-splitter-frontend
    container_name: exam-splitter-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
